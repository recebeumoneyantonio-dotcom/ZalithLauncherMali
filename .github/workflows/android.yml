name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Release build — roda em pushes para a branch main do SEU fork
  # Requer os seguintes Secrets configurados no repositório:
  #   ES_KEYSTORE_PASSWORD  → senha do seu .jks (igual para store e key)
  #   ES_KEYSTORE_FILE      → conteúdo do .jks em base64 (ver README)
  # -----------------------------------------------------------------------
  BuildRelease:
    if: "!startsWith(github.ref, 'refs/pull/') && github.ref_name == 'main'"
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]   # arm64 é o alvo principal; adicione outros se precisar
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Decode keystore
        run: |
          echo "${{ secrets.ES_KEYSTORE_FILE }}" | base64 --decode > ZalithLauncher/movtery-key.jks

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Release ${{ matrix.arch }}
        env:
          MOVTERY_KEYSTORE_PASSWORD: ${{ secrets.ES_KEYSTORE_PASSWORD }}
        run: |
          ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }} --no-daemon

      - name: Upload Release ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: EngenhariaSonora(Release) ${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/release/*

  # -----------------------------------------------------------------------
  # Debug build — roda em pull requests e em qualquer branch diferente de main
  # Não precisa de keystore — usa o debug.keystore padrão do Android
  # -----------------------------------------------------------------------
  BuildDebug:
    if: "startsWith(github.ref, 'refs/pull/') || github.ref_name != 'main'"
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          ./gradlew jre_lwjgl3glfw:build --no-daemon

      - name: Build Debug ${{ matrix.arch }}
        run: |
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --no-daemon

      - name: Upload Debug ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: EngenhariaSonora(Debug) ${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*
